<script>
(function () {
  try {
    let experimentsAndVariantsIds = "";
    let i = 0;

    // --- 1. Detect old vs new Convert format ---
    const data = window.convert && window.convert.data;
    if (!data) return;

    const isOld = !!data.experiments;   // legacy platform
    const isNew = !!data.experiences;   // new platform

    // Nothing to process
    if (!isOld && !isNew) return;

    // --- 2. Get the list of experiments in a unified format ---
    let experimentEntries = [];

    if (isOld) {
      // Legacy structure:
      // window.convert.currentData.experiments = { expId: { variation_id } }
      const exps = window.convert.currentData?.experiments || {};
      experimentEntries = Object.entries(exps).map(([id, exp]) => ({
        id,
        variant: exp.variation_id
      }));
    }

    if (isNew) {
      const exps = data.experiences || {};
      experimentEntries = Object.values(exps).map((exp) => ({
        id: exp.id,
        variant: exp.variations?.find(v => v.status === "running")?.id
      }));
    }

    // --- 3. Build the "1 : 2, 3 : 1" string ---
    for (const exp of experimentEntries) {
      if (!exp.variant) {
        continue;  // Skip if no variant found
      }
      const pair = exp.id + ' : ' + exp.variant;
      experimentsAndVariantsIds = i === 0 ? pair : experimentsAndVariantsIds + ' , ' + pair;
      i++;
    }

    // --- 4. Store final result ---
    if (experimentsAndVariantsIds) {
      sessionStorage.setItem('convert_experiment_ids', experimentsAndVariantsIds);
    }

  } catch (e) {
    console.log(e, 'Error in Global JavaScript');
  }
})();
